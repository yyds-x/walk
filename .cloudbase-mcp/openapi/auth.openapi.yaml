      title: |-
        如果返回信息中，包含手机号，则查询手机号是否在系统中存在
        如果是： 确认密码登录，如果否： 提示注册
    v1SignInAnonymouslyRequest:
      type: object
      properties: {}
      title: SignInAnonymouslyRequest 匿名注册请求
    v1SignInRequest:
      type: object
      properties:
        username:
          type: string
          title: 用户名
          description: 用户名密码登录时必传。2-48位，支持英文大小写、数字、特殊字符（仅支持-_.:+ @），且只能以字母或数字开头，不支持中文
        password:
          type: string
          title: 密码
          description: 用户名密码登录时必传
        verification_token:
          type: string
          title: 验证码token
          description: 验证码登录时必传。手机验证码登录时，通过验证码验证后，返回的验证码token。通过[验证短信、邮箱验证码](/http-api/auth/auth-verify-verification)接口获取
      title: SignInRequest 登录请求
    v1SignInWithProviderRequest:
      type: object
      properties:
        provider_id:
          type: string
          title: 身份源id
        provider_token:
          type: string
          title: 通过/auth/v1/provider/token获取的三方的providerToken
        force_disable_sign_up:
          type: boolean
          title: 强制关闭自动注册。默认情况下，这里以服务器配置为准，如果客户端为了平滑升级可以配置为true。
        sync_profile:
          type: boolean
          title: 是否强制从第三方同步昵称等信息
      title: SignInWithProviderRequest 通过第三方回调方式登录
      required:
        - provider_id
        - provider_token
    v1SignUpRequest:
      type: object
      properties:
        email:
          type: string
          title: 邮箱
          description: 邮箱+verification_token注册时必传
        phone_number:
          type: string
          title: 手机号
          description: 手机+verification_token注册时必传，+86不可省略。例如："+86 13000000000"
        username:
          type: string
          title: 用户名
          description: 长度2-48位，支持英文大小写、数字、特殊字符（仅支持-_.:+ @），且只能以字母或数字开头，不支持中文
        verification_token:
          type: string
          title: 接收到的验证码Token
          description: 手机+verification_token或邮箱+verification_token注册时必传
        password:
          type: string
          title: optional  password 密码
        name:
          type: string
          title: optional 昵称, 可选
        gender:
          type: string
          title: optional 头像, 符合css编码格式
        picture:
          type: string
          title: optional 头像, 符合css编码格式
        locale:
          type: string
          title: |-
            optional 地区, 可选 (如果地区为空, 则h后端会根据手机号码,ip地址等多种因素, 选择初始化地区)
            格式: zh
        provider_token:
          type: string
          title: 如果之前获取过三方信息， 则可以将三方信息绑定到该账号
          description: /auth/v1/provider/token等接口返回的provider_token
      title: SignUpRequestRequest 注册请求
    v1Token:
      type: object
      properties:
        token_type:
          type: string
          description: 统一返回 Bearer
          title: 访问令牌类型
        access_token:
          type: string
          title: 用户的访问令牌
          description: 用于访问云开发HTTP API的令牌，长度4096位以内
        refresh_token:
          type: string
          title: 用户的刷新令牌
          description: access_token过期可通过refresh_token刷新获取新的access_token，过期时间默认为31天。长度128位以内
        expires_in:
          type: integer
          format: int32
          description: access_token的过期时间，单位为秒
          title: 访问令牌过期时间
        scope:
          type: string
          title: 授权范围
        sub:
          type: string
          title: 用户的唯一id
        groups:
          type: array
          items:
            type: string
          title: 用户角色列表
      title: Token 返回的token 信息
    v1TokenRequest:
      type: object
      properties:
        grant_type:
          type: string
          title: 获取token的授权方式
          nullable: true
        code:
          type: string
          title: grant_type 为 authorization_code 时使用
        refresh_token:
          type: string
          title: refresh_token 刷新token时, 使用
        username:
          type: string
          title: grant_type 为 password时使用
        password:
          type: string
          title: grant_type 为 password时使用
        scope:
          type: string
          title: scope，可选
        nonce:
          type: string
          title: 随机字符串, 可选
        code_verifier:
          type: string
          title: 'PKCE: code_verifier'
        device_code:
          type: string
          title: Device Code Flow https://tools.ietf.org/html/rfc8628
      title: TokenRequest 换取token请求
    v1CheckIfUserExistResponse:
      type: object
      properties:
        exist:
          type: boolean
          description: 用户是否存在标识，true表示用户已存在，false表示用户不存在
      description: 用户存在性检查响应，用于注册前检查用户名、邮箱或手机号是否已被注册
    v1SignoutRequest:
      type: object
      description: 退出登录请求
      properties:
        redirect_uri:
          type: string
          description: 登出成功后重定向地址, 可选
        state:
          type: string
          description: 登出成功后重定向地址携带的参数, 可选
    v1SignoutResponse:
      type: object
      description: 退出登录响应
      properties:
        redirect_uri:
          type: string
          description: 登出成功后重定向地址, 可选
    v1TokenIntrospectResponse:
      type: object
      description: 验证token响应, 如果token有效, 则返回token信息, 如果token无效, 则返回空对象
      properties:
        token_type:
          type: string
          description: 令牌类型
        client_id:
          type: string
          description: 令牌所属应用的客户端ID
        sub:
          type: string
          description: 令牌所属用户的ID
        scope:
          type: string
          description: 令牌所允许的范围
    v1Profile:
      type: object
      description: 用户信息
      properties:
        sub:
          type: string
          description: 用户sub
        name:
          type: string
          description: 用户昵称
        picture:
          type: string
          description: 头像
        username:
          type: string
          description: 用户名
        email:
          type: string
          description: 邮箱
        phone_number:
          type: string
          description: 手机号
        providers:
          type: array
          description: 用户绑定的登录方式
          items:
            $ref: '#/components/schemas/v1ProfileProvider'
        status:
          description: 用户状态
          $ref: '#/components/schemas/ProfileProfileStatus'
        gender:
          type: string
          description: 性别
        groups:
          type: array
          description: 用户组, 用户绑定的角色标识列表
          items:
            $ref: '#/components/schemas/v1ProfileGroup'
        meta:
          type: object
          additionalProperties:
            type: string
          description: 用户扩展信息
        created_at:
          type: string
          format: date-time
          description: 创建时间
        updated_at:
          type: string
          format: date-time
          description: 更新时间
        password_updated_at:
          type: string
          format: date-time
          description: 密码更新时间
        user_id:
          type: string
          description: 微搭用户ID
        has_password:
          type: boolean
          description: 是否有密码
        internal_user_type:
          type: string
          description: 内部用户类型, 内置超管-administrator、普通用户-generalUser
        type:
          type: string
          description: 用户类型, 内部用户-internal、外部用户-external
        user_source:
          type: integer
          format: int32
          description: 用户来源, 1-自建, 2-企业微信, 3-外部注册
        user_desc:
          type: string
          description: 用户描述
        open_id:
          type: string
          description: 微信或企微的openID
        corp_id:
          type: string
          description: 企业ID
        parent_user_id:
          type: string
          description: 直属上级ID
        main_dep:
          type: string
          description: 主岗部门ID
        sort:
          type: integer
          format: int32
          description: 排序值, sort越小, 排序越靠前
        last_login:
          type: string
          format: date-time
          description: 最近登录时间
    v1ProfileProvider:
      type: object
      description: 用户绑定身份源信息
      properties:
        id:
          type: string
          description: 身份源ID
        provider_user_id:
          type: string
          description: 身份源用户ID
        name:
          type: string
          description: 身份源名称
        picture:
          type: string
          description: 身份源头像
        url:
          type: string
          description: 身份源URL
        meta:
          type: object
          additionalProperties:
            type: string
          description: 身份源扩展信息
    v1ProfileGroup:
      type: object
      description: 用户所属组信息
      properties:
        id:
          type: string
          description: 角色标识
    ProfileProfileStatus:
      type: string
      enum: [ DEFAULT, ACTIVE, PENDING, BLOCKED ]
      description: 用户状态, 默认-DEFAULT, 已激活-ACTIVE, 待激活-PENDING, 已禁用-BLOCKED
    v1UpdatePasswordRequest:
      type: object
      description: 修改密码请求
      properties:
        sudo_token:
          type: string
          description: 管理员令牌, 如果原账户没有设置密码, 并且手机号和邮箱都是空, 则不需要管理员令牌, 直接修改
        new_password:
          type: string
          description: 新密码
          required: true
    v1SudoRequest:
      type: object
      description: 获取管理员临时令牌请求
      properties:
        password:
          type: string
          description: 用户密码
        verification_token:
          type: string
          description: 验证码令牌, 手机号或邮箱验证码获取的验证token, 需要调用/auth/v1/verification/verify接口验证
    v1SudoResponse:
      type: object
      description: 获取管理员临时令牌响应
      properties:
        sudo_token:
          type: string
    v1ProvidersResponse:
      type: object
      description: 获取用户绑定身份源列表响应
      properties:
        total:
          type: integer
          format: int32
          description: 总数
        data:
          type: array
          items:
            $ref: '#/components/schemas/v1UserProvider'
          description: 绑定身份源数据
    v1UserProvider:
      type: object
      description: 用户绑定身份源信息
      properties:
        id:
          type: string
          description: 身份源标识
        name:
          type: string
          description: 身份源名称
        homepage:
          type: string
          description: 身份源主页
        picture:
          type: string
          description: 身份源头像
        provider_user_name:
          type: string
          description: 身份源用户名
        provider_type:
          type: string
          description: 身份源类型
        bind:
          type: boolean
          description: 是否绑定
  securitySchemes: {}
