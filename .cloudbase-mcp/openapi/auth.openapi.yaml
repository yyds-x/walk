openapi: 3.0.0
info:
  title: 登录认证接口
  version: 1.0.0
  description: >-
    ### 功能介绍
    
    这里给出了登录认证接口的API，以及每个API的参数参考。
    
    ### HTTP 状态码
    
    根据返回结果的不同，可能会出现 `2xx`, `4xx`, `5xx` 状态码。应当视情况处理。

servers:
  - url: https://{envId}.api.tcloudbasegateway.com
    description: TCB openapi endpoint
    variables:
      envId:
        default: "your-envId"
        description: 环境 ID
tags:
  - name: 登录认证
  - name: 第三方登录认证
  - name: token管理
  - name: 用户管理
  - name: 验证码
paths:
  /auth/v1/provider/uri:
    get:
      summary: 获取三方登录的回调地址
      deprecated: false
      description: |-
        ## 接口说明
        获取第三方身份源登录的回调地址，用于OAuth授权流程
        
        ### 入参要求：
        - `provider_id`: 身份源id（必填，如：github、wechat等）
        - `redirect_uri`: 重定向地址（可选）
        - `state`: 客户端状态参数（可选，用于防止CSRF攻击）
        - `scope`: 授权范围（可选）
        - `response_type`: 授权类型（可选）
        - `client_id`: 客户端id（可选，默认为环境id）
        - `x-device-id`: 设备id（必填，请求头中传入）
        
        ### 出参：
        - 返回第三方登录的回调地址URI
        
        ### 请求示例：
        ```
        GET /auth/v1/provider/uri?provider_id=github&state=random_state_string
        x-device-id: device_123456
        ```
        
        ### 响应示例：
        ```json
        {
          "uri": "https://github.com/login/oauth/authorize?client_id=your_client_id&redirect_uri=https://your-app.com/callback&state=random_state_string&scope=user"
        }
        ```
        
        ### 使用流程：
        1. 调用此接口获取第三方登录地址
        2. 将用户重定向到返回的URI
        3. 用户完成第三方授权后，回调到指定的redirect_uri
        4. 在回调中获取授权码，用于后续token获取
      operationId: Auth_GenProviderRedirectURI
      tags:
        - 第三方登录认证
      parameters:
        - name: provider_id
          in: query
          description: 身份源id
          required: true
          example: github
          schema:
            type: string
        - name: redirect_uri
          in: query
          description: 重定向地址
          required: false
          schema:
            type: string
        - name: state
          in: query
          description: 客户端的当前状态，可以指定任意值
          required: false
          schema:
            type: string
        - name: scope
          in: query
          description: 授权范围
          required: false
          schema:
            type: string
        - name: response_type
          in: query
          description: 授权类型
          required: false
          schema:
            type: string
        - name: client_id
          in: query
          description: 应用对应的客户端id，默认为环境id，可以不传
          required: false
          schema:
            type: string
        - name: x-device-id
          in: header
          description: 设备id
          required: true
          example: ''
          schema:
            type: string
      responses:
        '200':
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/v1GenProviderRedirectURIResponse'
          headers: {}
        '500':
          description: An unexpected error response.
          content:
            application/json:
              schema: &ref_0
                $ref: '#/components/schemas/rpcStatus'
          headers: {}
      security: []
  /auth/v1/provider/token:
    post:
      summary: 获取三方授权信息
      deprecated: false
      description: |-
        ## 接口说明
        获取第三方服务的授权信息，通过OAuth登录获取OAuth客户端对应的授权用户信息，生成provider_token
        
        ### 入参要求：
        - `client_id`: 应用对应的客户端id（可选，默认为环境id）
        - `x-device-id`: 设备id（必填，请求头中传入）
        - 请求体参数（v1GrantProviderTokenRequest）：
          - `provider_id`: 身份源id（必填，如：github、wechat等）
          - `provider_code`: 第三方系统获取的登录code（必填，用于换取用户身份）
          - `provider_redirect_uri`: 身份源回调地址（可选）
        
        ### 前置条件：
        - 需要先通过第三方授权流程获取授权码（code）
        - 第三方身份源需要在云开发平台配置
        
        ### 出参：
        - 返回provider_token和provider_profile信息（v1GrantProviderTokenResponse）
        - provider_token用于后续登录接口调用
        - provider_profile包含第三方用户的基本信息
        
        ### 获取三方授权信息请求示例
        ```
        POST /auth/v1/provider/token
        x-device-id: device_123456
        Content-Type: application/json
        
        {
          "provider_id": "github",
          "provider_code": "authorization_code_from_github",
          "provider_redirect_uri": "https://your-app.com/callback"
        }
        ```
        
        ### 获取三方授权信息响应示例
        ```json
        {
          "provider_token": "your_provider_token",
          "expires_in": 3600,
          "provider_profile": {
            "provider_id": "github",
            "sub": "1234567890",
            "name": "张三",
            "picture": "https://avatars.githubusercontent.com/u/1234567890",
            "email": "zhangsan@example",
            "provider": "github"
          }
        }
        ```
        
        ### 使用流程：
        1. 用户完成第三方授权后，获取授权码（code）
        2. 调用此接口使用授权码换取provider_token
        3. 使用provider_token调用[第三方授权信息登录](/http-api/auth/auth-sign-in-with-provider)接口完成登录
        
        ### 关键特性：
        - provider_token有效期为3600秒（1小时）
        - 返回的provider_profile包含第三方用户的完整信息
        - 支持自动注册新用户（如果用户不存在）
        - 支持绑定到现有用户账号
      operationId: Auth_GrantProviderToken
      tags:
        - 第三方登录认证
      parameters:
        - name: client_id
          in: query
          description: 应用对应的客户端id，默认为环境id，可以不传
          required: false
          schema:
            type: string
        - name: x-device-id
          in: header
          description: 设备id
          required: true
          example: ''
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/v1GrantProviderTokenRequest'
            example: ''
      responses:
        '200':
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/v1GrantProviderTokenResponse'
          headers: {}
        '500':
          description: An unexpected error response.
          content:
            application/json:
              schema: *ref_0
          headers: {}
      security: []
  /auth/v1/signin/with/provider:
    post:
      summary: 第三方授权token登录
      deprecated: false
      description: |-
        ## 接口说明
        通过第三方授权信息生成的provider_token进行登录，支持自动注册新用户或绑定到现有用户
        
        ### 入参要求：
        - `client_id`: 应用对应的客户端id（可选，默认为环境id）
        - `x-device-id`: 设备id（必填，请求头中传入）
        - 请求体参数（v1SignInWithProviderRequest）：
          - `provider_token`: provider_token（必填，通过[获取三方授权信息](/http-api/auth/auth-grant-provider-token)接口获取）
          - `force_disable_sign_up`: 强制关闭自动注册（可选，默认false）
          - `sync_profile`: 是否强制从第三方同步昵称等信息（可选，默认false）
        
        ### 前置条件：
        - 需要先调用[获取三方授权信息](/http-api/auth/auth-grant-provider-token)接口获取有效的provider_token
        - provider_token必须在有效期内（默认1小时）
        - 第三方身份源需要在云开发平台配置并启用
        
        ### 出参：
        - 返回标准的token响应（access_token、refresh_token等）
        - 如果用户不存在且自动注册开启，会自动创建新用户
        - 如果用户已存在，会绑定第三方身份源到现有用户
        
        ### 第三方授权token登录请求示例
        ```
        POST /auth/v1/signin/with/provider
        x-device-id: device_123456
        Content-Type: application/json
        
        {
          "provider_token": "your_provider_token",
          "force_disable_sign_up": false,
          "sync_profile": true
        }
        ```
        
        ### 第三方授权token登录响应示例
        ```json
        {
          "token_type": "Bearer",
          "access_token": "your_access_token",
          "refresh_token": "m.aB3cD4eF5gH6iJ7kL8mN9oP0qR1sT2uV3wX4yZ5aB6cD7eF8gH9iJ0kL1mN2oP3qR4sT5uV6wX7yZ8",
          "expires_in": 7200,
          "scope": "user sso",
          "sub": "9876543210123456789"
        }
        ```
        
        ### 使用流程：
        1. 用户完成第三方授权，获取授权码（code）
        2. 调用[获取三方授权信息](/http-api/auth/auth-grant-provider-token)接口换取provider_token
        3. 调用此接口使用provider_token进行登录
        4. 返回标准的access_token和refresh_token
        
        ### 关键特性：
        - 支持自动注册新用户（如果force_disable_sign_up为false）
        - 支持绑定到现有用户账号
        - 可以强制同步第三方用户信息到本地账号
        - 支持多种第三方身份源（GitHub、微信、Google等）
        
        ### 注意事项：
        - provider_token有效期较短，建议及时使用
        - 如果用户已存在，会自动绑定第三方身份源
        - 自动注册功能可以在云开发平台配置是否开启
        - 同步用户信息功能可以更新本地用户的昵称、头像等信息
      operationId: Auth_SignInWithProvider
      tags:
        - 第三方登录认证
      parameters:
        - name: client_id
          in: query
          description: 应用对应的客户端id，默认为环境id，可以不传
          required: false
          schema:
            type: string
        - name: x-device-id
          in: header
          description: 设备id
          required: true
          example: ''
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/v1SignInWithProviderRequest'
            example: ''
      responses:
        '200':
          description: A successful response.
          content:
            application/json:
              schema: &ref_1
                $ref: '#/components/schemas/v1Token'
          headers: {}
        '500':
          description: An unexpected error response.
          content:
            application/json:
              schema: *ref_0
          headers: {}
      security: []
  /auth/v1/signin/custom:
    post:
      summary: 自定义登录
      deprecated: false
      description:  |-
        ## 适用场景
        - 企业自有账号体系与 CloudBase 账号体系的一对一映射
        - 需要完全自定义鉴权流程的业务场景
        - 需要实现自有账号系统与云开发服务的无缝集成
        
        ## 功能说明
        ### 1.服务端签发 Ticket
        开发者需在服务端使用 CloudBase SDK 签发登录凭证(Ticket)，该凭证用于后续客户端认证
        - 参考[自定义登录文档](https://docs.cloudbase.net/authentication-v2/method/custom-login)，获取ticket前的部分
        #### 代码示例：
        ```
          const cloudbase = require("@cloudbase/node-sdk");
  
          // 1. 初始化 SDK
          const app = cloudbase.init({
          env: "your-env-id",
            // 传入自定义登录私钥
          credentials: require("/path/to/your/tcb_custom_login.json")
          });
            
          // 2. 开发者自定义的用户唯一身份标识
          const customUserId = "your-customUserId";
          
          // 3. 创建ticket
          const ticket = app.auth().createTicket(customUserId);
          
          // 4. 将ticket返回至客户端
          return ticket;
        ```
        
        ### 2.客户端自定义登录
        #### 接口说明
        客户端使用服务端签发的 Ticket 获取访问凭证
        #### 请求示例：
        ```
          {
            "provider_id": "custom",
            "ticket": "your_ticket"
          }
        ```
        
        #### 关键特性：
          - access_token 有效期为 7200 秒（2小时）
          - refresh_token 有效期为 2592000 秒（30天）
          - 建议实现 token 自动刷新机制
      operationId: Auth_SignInCustom
      tags:
        - 第三方登录认证
      parameters:
        - name: client_id
          in: query
          description: 应用对应的客户端id，默认为环境id，可以不传
          required: false
          schema:
            type: string
        - name: x-device-id
          in: header
          description: 设备id
          required: false
          example: ''
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                provider_id:
                  type: string
                  title: 身份源id，自定义登录时固定传custom
                ticket:
                  type: string
                  title: 自定义登录ticket
              required:
                - provider_id
                - ticket
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema: &ref_1
                $ref: '#/components/schemas/v1Token'
          headers: { }
      security: [ ]
  /auth/v1/signin:
    post:
      summary: 用户登录接口
      deprecated: false
      description: |-
        ## 登录场景说明
        
        ### 1. 用户名密码登录
        #### 入参要求：
        - `username`: 用户名（必填，2-48位，支持英文大小写、数字、特殊字符（仅支持-_.:+ @），且只能以字母或数字开头，不支持中文）
        - `password`: 密码（必填）
        
        #### 前置条件：
        - 已注册用户使用用户名密码登录
        
        #### 出参：
        - 返回标准的token响应（access_token、refresh_token等）
        
        #### 用户名密码登录请求示例
        ```json
        {
          "username": "zhangsan",
          "password": "DemoPass123!@#"
        }
        ```
        #### 用户名密码登录响应示例
        ```json
        {
          "token_type": "Bearer",
          "access_token": "your_access_token",
          "refresh_token": "m.aB3cD4eF5gH6iJ7kL8mN9oP0qR1sT2uV3wX4yZ5aB6cD7eF8gH9iJ0kL1mN2oP3qR4sT5uV6wX7yZ8",
          "expires_in": 7200,
          "sub": "9876543210123456789"
        }
        ```
        
        ### 2. 手机号验证码登录
        #### 入参要求：
        - `verification_token`: 验证码token，必填，通过[验证短信、邮箱验证码](/http-api/auth/auth-verify-verification)接口获取
        
        #### 前置条件：
        - 需要先调用验证码发送接口获取验证码
        - 验证码验证通过后获取verification_token
        
        #### 出参：
        - 返回标准的token响应（access_token、refresh_token等）
        
        #### 手机号验证码登录请求示例
        ```json
        {
          "verification_token": "your_access_token"
        }
        ```
        #### 手机号验证码登录响应示例
        ```json
        {
          "token_type": "Bearer",
          "access_token": "your_access_token",
          "refresh_token": "m.aB3cD4eF5gH6iJ7kL8mN9oP0qR1sT2uV3wX4yZ5aB6cD7eF8gH9iJ0kL1mN2oP3qR4sT5uV6wX7yZ8",
          "expires_in": 7200,
          "sub": "9876543210123456789"
        }
        ```
        
        ### 3. 邮箱验证码登录
        #### 入参要求：
        - `verification_token`: 验证码token，必填，通过[验证短信、邮箱验证码](/http-api/auth/auth-verify-verification)接口获取
        
        #### 前置条件：
        - 需要先调用邮箱验证码发送接口获取验证码
        - 验证码验证通过后获取verification_token
        
        #### 出参：
        - 返回标准的token响应（access_token、refresh_token等）
        
        #### 邮箱验证码登录请求示例
        ```json
        {
          "verification_token": "your_access_token"
        }
        ```
        #### 邮箱验证码登录响应示例
        ```json
        {
          "token_type": "Bearer",
          "access_token": "your_access_token",
          "refresh_token": "m.aB3cD4eF5gH6iJ7kL8mN9oP0qR1sT2uV3wX4yZ5aB6cD7eF8gH9iJ0kL1mN2oP3qR4sT5uV6wX7yZ8",
          "expires_in": 7200,
          "sub": "9876543210123456789"
        }
        ```
        
        ### 通用说明：
        - 三种登录方式互斥，每次请求只能使用一种方式
        - 验证码登录时，需要通过[验证短信、邮箱验证码](/http-api/auth/auth-verify-verification)接口获取verification_token
        - 登录成功后返回标准的token响应

      operationId: Auth_SignIn
      tags:
        - 登录认证
      parameters:
        - name: client_id
          in: query
          description: 应用对应的客户端id，可从云开发平台-->身份认证-->开发设置获取。默认为环境id，可以不传
          required: false
          schema:
            type: string
        - name: x-device-id
          in: header
          description: 设备id，当前登录设备的id。客户端应随机生成，并缓存到客户端。此参数与登录账号数有关
          required: false
          example: ''
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/v1SignInRequest'
            example:
              username: zhangsan
      password: DemoPass123!@#
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema: *ref_1
              example:
                token_type: Bearer
                access_token: >-
                  your_access_token
                refresh_token: m.aB3cD4eF5gH6iJ7kL8mN9oP0qR1sT2uV3wX4yZ5aB6cD7eF8gH9iJ0kL1mN2oP3qR4sT5uV6wX7yZ8
                expires_in: 7200
                sub: '9876543210123456789'
          headers: {}
        '400':
          description: |-
            - invalid_username_or_password，用户名或密码有误
            - captcha_required，登录失败重试次数过多等原因，需要验证码
            - password_not_set，用户密码未设置，需要设置密码
            - invalid_status，账号重试次数过多等原因导致账号被锁定，请稍后重试
          content:
            application/json:
              schema: *ref_0
              example:
                error: invalid_username_or_password
                error_code: 4043
                error_description: Username or password incorrect.
          headers:
            X-Request-Id:
              example: 1e55ed89-4a2b-47f8-b7de-27b4775c2adb
              required: false
              description: 请求id
              schema:
                type: string
        '501':
          description: >-
            - username login is disabled by admin，用户名密码未开启，前往https://tcb.cloud.tencent.com身份认证功能开启
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  error_code:
                    type: integer
                  error_description:
                    type: string
                required:
                  - error
                  - error_code
                  - error_description
              example:
                error: unimplemented
                error_code: 12
                error_description: username login is disabled by admin
          headers: {}
      security: []
  /auth/v1/signin/anonymously:
    post:
      summary: 匿名登录
      deprecated: false
      description: |-
        ## 接口说明
        匿名登录接口，同一个设备ID最多只能注册一个匿名用户，生成匿名用户的access_token
        
        ### 入参要求：
        - `x-device-id`: 设备id（必填，请求头中传入）
        - `client_id`: 应用对应的客户端id（可选，默认为环境id）
        
        ### 前置条件：
        - 同一个设备ID只能注册一个匿名用户
        - 设备ID需要客户端随机生成并缓存
        
        ### 出参：
        - 返回标准的token响应（access_token、refresh_token等）
        - scope为"anonymous"，表示匿名用户
        
        ### 匿名登录请求示例
        ```
        POST /auth/v1/signin/anonymously
        x-device-id: device_123456
        Content-Type: application/json
        
        {}
        ```
        
        ### 匿名登录响应示例
        ```json
        {
          "token_type": "Bearer",
          "access_token": "your_access_token",
          "expires_in": 7200,
          "scope": "anonymous",
          "sub": "7ft9WRremXrz-TfgoAR9Uw"
        }
        ```
        
        ### 关键特性：
        - 同一个设备ID只能生成一个匿名用户
        - 匿名用户没有用户名、密码等个人信息
        - 适合临时使用或体验功能的场景
        - 可以通过绑定其他登录方式升级为正式用户
      operationId: Auth_SignInAnonymously
      tags:
        - 登录认证
      parameters:
        - name: client_id
          in: query
          description: 应用对应的客户端id，可从云开发平台-->身份认证-->开发设置获取。默认为环境id，可以不传
          required: false
          schema:
            type: string
        - name: x-device-id
          in: header
          description: >-
            匿名登录时必填。设备id，当前登录设备的id。客户端应随机生成，并缓存到客户端。此参数在匿名登录时用于计算用户id，未缓存会导致匿名用户再次登录，用户id发生变化
          required: true
          example: ''
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/v1SignInAnonymouslyRequest'
            example: {}
      responses:
        '200':
          description: A successful response.
          content:
            application/json:
              schema: *ref_1
              example:
                token_type: Bearer
                access_token: >-
                  your_access_token
                expires_in: 7200
                scope: anonymous
                sub: 7ft9WRremXrz-TfgoAR9Uw
          headers: {}
        '400':
          description: |-
            - invalid_argument请在请求头添加设备id，x-device-id在Header中未传入
            - unimplemented请联系管理员开启匿名登录，匿名登录未开启，前往云开发平台开启
          content:
            application/json:
              schema:
                type: object
                properties: {}
          headers: {}
        '403':
          description: ''
          content:
            application/json:
              schema:
                title: ''
                type: object
                properties: {}
              example:
                error: permission_denied
                error_code: 7
                error_description: >-
                  cors permission denied, please check if
                  demo-app-3g4h5i6j7k8l-9876543210.example.com in
                  your client XyZ9aB1cD2eF3gH4iJ5 domains
          headers: {}
        '500':
          description: An unexpected error response.
          content:
            application/json:
              schema: *ref_0
          headers: {}
      security: []
  /auth/v1/signup:
    post:
      summary: 注册新用户
      deprecated: false
      description: |-
        注册新用户，支持以下三种注册场景：
        
        ### 1. 手机号+验证码注册
        #### 入参要求：
        - `phone_number`: 手机号（必填，格式："+86 13000000000"）
        - `verification_token`: 验证码token，必填，通过[验证短信、邮箱验证码](/http-api/auth/auth-verify-verification)接口获取
        - `username`: 用户名（可选，2-48位）
        - `password`: 密码（可选）
        
        #### 出参：
        - 返回标准的token响应（access_token、refresh_token等）
       
        #### 手机号+验证码注册请求示例
        ```json
        {
          "phone_number": "+86 13000000000",
          "verification_token": "your_access_token",
          "username": "user123",
          "password": "Password@123"
        }
        ```
        #### 手机号+验证码注册响应示例
        ```json
        {
          "token_type": "Bearer",
          "access_token": "your_access_token",
          "refresh_token": "m.Y7Nk75cRMmeMrwYOqmG0Sju4YjZiiPRO-lE",
          "expires_in": 7200,
          "sub": "9876543210123456789"
        }
        ```
        
        ### 2. 邮箱+验证码注册
        #### 入参要求：
        - `email`: 邮箱地址（必填）
        - `verification_token`: 验证码token，必填，通过[验证短信、邮箱验证码](/http-api/auth/auth-verify-verification)接口获取
        - `username`: 用户名（可选，5-24位）
        - `password`: 密码（可选）
        
        #### 出参：
        - 返回标准的token响应（access_token、refresh_token等）
        
        #### 邮箱+验证码注册请求示例
        ```json
        {
          "email": "user@example",
          "verification_token": "your_access_token",
          "username": "user456",
          "password": "DemoPass123!@#"
        }
        ```
        #### 邮箱+验证码注册响应示例
        ```json
        {
          "token_type": "Bearer",
          "access_token": "your_access_token",
          "refresh_token": "m.Y7Nk75cRMmeMrwYOqmG0Sju4YjZiiPRO-lE",
          "expires_in": 7200,
          "sub": "9876543210123456789"
        }
        ```
        
        ### 3. 第三方授权注册
        #### 入参要求：
        - `provider_token`: 第三方身份源token（必填）
        - `username`: 用户名（可选，5-24位）
        - `password`: 密码（可选）
        
        #### 出参：
        - 返回标准的token响应（access_token、refresh_token等）
        
        #### 第三方授权注册请求示例
        ```json
        {
          "provider_token": "your_provider_token",
          "username": "github_user",
          "password": "SamplePass456$%^"
        }
        ```
        #### 第三方授权注册响应示例
        ```json
        {
          "token_type": "Bearer",
          "access_token": "your_access_token",
          "refresh_token": "m.Y7Nk75cRMmeMrwYOqmG0Sju4YjZiiPRO-lE",
          "expires_in": 7200,
          "sub": "9876543210123456789"
        }
        ```
        
        ### 通用说明：
        - 可在注册时同时设置用户名、密码
        - 验证码注册时，需要通过[验证短信、邮箱验证码](/http-api/auth/auth-verify-verification)接口获取verification_token
        - 不支持仅传入用户名、密码注册。用户名密码创建用户，请前往云后台创建

      operationId: Auth_SignUp
      tags:
        - 登录认证
      parameters:
        - name: client_id
          in: query
          description: 应用对应的客户端id，可从云开发平台-->身份认证-->开发设置获取。默认为环境id，可以不传
          required: false
          schema:
            type: string
        - name: x-device-id
          in: header
          description: 设备id，当前登录设备的id。客户端应随机生成，并缓存到客户端。此参数与登录账号数有关
          required: false
          example: ''
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/v1SignUpRequest'
            example:
              username: user03
              password: DemoPass123!@#
              email: demouser@123.com
              verification_token: >-
                your_access_token
      responses:
        '200':
          description: A successful response.
          content:
            application/json:
              schema: *ref_1
              example:
                token_type: Bearer
                access_token: >-
                  your_access_token
                refresh_token: m.Y7Nk75cRMmeMrwYOqmG0Sju4YjZiiPRO-lE
                expires_in: 7200
                sub: '1870014161959620608'
          headers: {}
        '400':
          description: |-
            - you can not signup just by username and password，不允许仅用用户名密码注册，用户身份需经过验证
            - phone number login is disabled by admin，手机号登录未开启，需在云开发平台开启
            - you can not set phone number and email at same time，手机号、邮箱不可同时设置
          content:
            application/json:
              schema: *ref_0
              example:
                error: unimplemented
                error_code: 12
                error_description: you can not signup just by username and password
          headers: {}
      security: []
  /auth/v1/user/signout:
    post:
      summary: 退出登录
      deprecated: false
      description: |-
        ## 接口说明
        用户退出登录接口，用于安全地终止用户会话。
        
        ### 功能特性
        - 清理后台token对应的refresh_token记录
        - 标记access_token为已失效状态
        - 支持客户端主动清理本地token缓存
        - 如果是退出第三方系统授权登录态, 会根据三方身份源的配置决定是否生成三方的退出登录链接
        
        ## 入参要求
        
        ### 必需参数
        - `Authorization`: 请求头中传入Bearer认证，格式为 `Bearer ${access_token}`
        
        ### 可选参数
        - `client_id`: 应用对应的客户端id，默认为环境id，可以不传
        - `x-device-id`: 设备id，当前登录设备的id
        - `redirect_uri`: 登出成功后重定向地址（可选）
        - `state`: 登出成功后重定向地址携带的参数（可选）
        
        ## 前置条件
        - 用户必须处于已登录状态
        - access_token须有效且未过期
        - 客户端需要缓存access_token用于退出登录
        
        ## 出参说明
        
        ### 成功响应
        - 返回200状态码表示退出登录成功
        - 可选的`redirect_uri`用于页面重定向
        
        ### 退出登录请求示例
        ```
        POST /auth/v1/user/signout
        Authorization: Bearer your_access_token
        x-device-id: device_123456
        Content-Type: application/json
        {}
        ```
        
        ## 响应示例
        
        ### 成功响应
        ```json
        {
          "redirect_uri": "https://example/logout-callback?state=logout_state_123"
        }
        ```
        
        ### 参数错误响应
        ```json
        {
          "error": "invalid_argument",
          "error_code": 3,
          "error_description": "device id must less than 72"
        }
        ```
        
        ## 使用流程
        
        ### 1. 客户端清理本地token
        - 删除本地存储的access_token和refresh_token
        - 清除相关的用户会话信息
        
        ### 2. 调用退出登录接口
        - 使用有效的access_token调用退出登录接口
        - 可选传入重定向地址和状态参数
        
        ### 3. 处理服务端响应
        - 如果返回重定向地址，进行页面跳转
        - 如果返回错误信息，进行相应处理
        
        ### 4. 验证token状态
        - 可调用[验证token](/http-api/auth/auth-token-introspect)接口确认token已失效
        
        ## 注意事项
        
        ### 安全规范
        - JWT token是客户端保存的，需要客户端主动清理
        - 退出登录后，access_token将立即失效
        - refresh_token将被标记为不可用状态
        
        ### 错误处理
        - 如果access_token已过期，退出登录接口仍会返回成功
        - 设备id长度超过限制会导致参数错误
        - 服务器内部错误需要重试机制

      operationId: Auth_SignOut
      tags:
        - 登录认证
      parameters:
        - name: client_id
          in: query
          description: 应用对应的客户端id，可从云开发平台-->身份认证-->开发设置获取。默认为环境id，可以不传
          required: false
          schema:
            type: string
        - name: x-device-id
          in: header
          description: 设备id，当前登录设备的id。客户端应随机生成，并缓存到客户端。此参数与登录账号数有关
          required: false
          example: ''
          schema:
            type: string
        - name: Authorization
          in: header
          description: 当前登录用户的access_token, 值的格式为Bearer xxx
          required: true
          schema:
            type: string
          example: Bearer your_access_token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/v1SignoutRequest'
      responses:
        '200':
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/v1SignoutResponse'
          headers: {}
        '400':
          description: An unexpected error response.
          content:
            application/json:
              schema: *ref_0
              example:
                error: invalid_argument
                error_code: 3
                error_description: device id must less than 72
          headers: {}
        '500':
          description: An unexpected error response.
          content:
            application/json:
              schema: *ref_0
          headers: {}
      security:
        - JWTAuth: []
  /auth/v1/token:
    post:
      summary: 获取或刷新token
      deprecated: false
      operationId: Auth_GrantToken
      tags:
        - token管理
      parameters:
        - name: client_id
          in: query
          description: 应用对应的客户端id，默认为环境id，可以不传
          required: false
          schema:
            type: string
        - name: x-device-id
          in: header
          description: 设备id，当前登录设备的id。客户端应随机生成，并缓存到客户端。此参数与登录账号数有关
          required: false
          example: ''
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/v1TokenRequest'
            example:
              client_id: your_client_id
              grant_type: refresh_token
              refresh_token: your_refresh_token

      responses:
        '200':
          description: A successful response.
          content:
            application/json:
              schema: *ref_1
          headers: {}
        '500':
          description: An unexpected error response.
          content:
            application/json:
              schema: *ref_0
          headers: {}
      security: []
      description: |-
        ## 接口说明
        获取或刷新token接口，支持多种OAuth 2.0标准授权模式，用于获取access_token和refresh_token。
        
        ## 授权模式说明
        
        ### 1. Refresh Token 刷新模式
        #### 入参要求：
        - `grant_type`: 授权类型（必填，固定值为"refresh_token"）
        - `refresh_token`: 刷新令牌（必填，用于获取新的access_token）
        - `client_id`: 应用对应的客户端id（可选，默认为环境id）
        - `x-device-id`: 设备id（可选，请求头中传入）
        
        #### 前置条件：
        - 必须持有有效的refresh_token
        - refresh_token未过期且未被撤销
        
        #### 出参：
        - `token_type`: token类型，固定为"Bearer"
        - `access_token`: 访问令牌，用于访问受保护的资源
        - `refresh_token`: 新的刷新令牌，原refresh_token随即失效
        - `expires_in`: access_token过期时间（秒）
        - `sub`: 用户唯一标识
        
        #### Refresh Token刷新请求示例
        ```json
        {
          "client_id": "demo-app-2f8a9c3e1b4d",
          "grant_type": "refresh_token",
          "refresh_token": "m.yPxK8mLnVrQwEoDzFcHbNtGsYvXpRjWq-3eSd2fA1gU5iI9kO0lP7uJ4mT6nB8yC"
        }
        ```
        
        #### Refresh Token刷新响应示例
        ```json
        {
          "token_type": "Bearer",
          "access_token": "your_access_token",
          "refresh_token": "m.aB3cD4eF5gH6iJ7kL8mN9oP0qR1sT2uV3wX4yZ5aB6cD7eF8gH9iJ0kL1mN2oP3qR4sT5uV6wX7yZ8",
          "expires_in": 7200,
          "sub": "9876543210123456789"
        }
        ```
        
        ### 2. 密码模式认证
        #### 入参要求：
        - `grant_type`: 授权类型（必填，固定值为"password"）
        - `username`: 用户名（必填）
        - `password`: 密码（必填）
        - `client_id`: 应用对应的客户端id（可选，默认为环境id）
        - `x-device-id`: 设备id（可选，请求头中传入）
        
        #### 前置条件：
        - 用户已注册并设置密码
        - 用户名密码登录方式已开启
        
        #### 出参：
        - `token_type`: token类型，固定为"Bearer"
        - `access_token`: 访问令牌
        - `refresh_token`: 刷新令牌
        - `expires_in`: access_token过期时间（秒）
        - `sub`: 用户唯一标识
        
        #### 密码模式请求示例
        ```json
        {
          "client_id": "demo-app-2f8a9c3e1b4d",
          "grant_type": "password",
          "username": "zhangsan",
          "password": "DemoPass123!@#"
        }
        ```
        
        #### 密码模式响应示例
        ```json
        {
          "token_type": "Bearer",
          "access_token": "your_access_token",
          "refresh_token": "m.aB3cD4eF5gH6iJ7kL8mN9oP0qR1sT2uV3wX4yZ5aB6cD7eF8gH9iJ0kL1mN2oP3qR4sT5uV6wX7yZ8",
          "expires_in": 7200,
          "sub": "9876543210123456789"
        }
        ```
        
        ### 3. 客户端凭证模式
        #### 入参要求：
        - `grant_type`: 授权类型（必填，固定值为"client_credentials"）
        - `client_id`: 应用对应的客户端id（可选，默认为环境id）
        - `Authorization`: 认证信息（必填，请求头中传入，格式为"Basic ${base64(SecretId:SecretKey)}"）
        
        #### 前置条件：
        - 必须持有有效的SecretId和SecretKey
        - 调用方需具备服务端可信环境
        - SecretKey需存储于安全介质
        
        #### 出参：
        - `token_type`: token类型，固定为"Bearer"
        - `access_token`: 访问令牌，具有超级管理员权限
        - `expires_in`: access_token过期时间（秒）
        - 注意：不返回refresh_token
        
        #### 客户端凭证模式请求示例
        ```
        POST /auth/v1/token
        Authorization: Basic bG93Y29kZS01ZzlhYzIwdTJhMjdkYTQ2OnNlY3JldF9rZXlfZXhhbXBsZQ==
        Content-Type: application/json
        
        {
          "client_id": "demo-app-2f8a9c3e1b4d",
          "grant_type": "client_credentials"
        }
        ```
        
        #### 客户端凭证模式响应示例
        ```json
        {
          "token_type": "Bearer",
          "access_token": "your_access_token",
          "expires_in": 7200
        }
        ```
        
        ## 字段说明
        
        ### 请求参数
        | 字段名 | 类型 | 必填 | 说明 |
        |--------|------|------|------|
        | grant_type | string | 是 | 授权类型，可选值：refresh_token、password、client_credentials |
        | refresh_token | string | 否 | 刷新令牌，grant_type为refresh_token时必填 |
        | username | string | 否 | 用户名，grant_type为password时必填 |
        | password | string | 否 | 密码，grant_type为password时必填 |
        | client_id | string | 否 | 客户端id，默认为环境id |
        | x-device-id | string | 否 | 设备id，请求头中传入 |
        | Authorization | string | 否 | 认证信息，grant_type为client_credentials时必填，请求头中传入 |
        
        ### 响应参数
        | 字段名 | 类型 | 说明 |
        |--------|------|------|
        | token_type | string | token类型，固定为"Bearer" |
        | access_token | string | 访问令牌，用于访问受保护的资源 |
        | refresh_token | string | 刷新令牌，用于获取新的access_token（client_credentials模式不返回） |
        | expires_in | integer | access_token过期时间（秒） |
        | sub | string | 用户唯一标识（client_credentials模式为service_account） |
        
        ## 关键特性
        
        ### Refresh Token刷新机制
        - 符合RFC 6749 Section 6标准
        - 原refresh_token使用后立即失效
        - 返回新的access_token和refresh_token
        - 支持无感刷新，提升用户体验
        
        ### 密码模式
        - 符合RFC 6749 Section 4.3标准
        - 适用于可信客户端
        - 直接使用用户名密码获取token
        - 返回access_token和refresh_token
        
        ### 客户端凭证模式
        - 符合RFC 6749 Section 4.4标准
        - 适用于服务端调用
        - 自动授予超级管理员权限
        - 不返回refresh_token
        - 需要SecretId和SecretKey认证
        
        ## 安全规范
        
        ### Refresh Token安全
        - refresh_token应安全存储在客户端
        - 使用后立即失效，防止重放攻击
        - 建议定期轮换refresh_token
        - 检测到异常时应立即撤销
        
        ### 密码模式安全
        - 仅在可信客户端中使用
        - 密码应加密传输（HTTPS）
        - 建议实现登录失败次数限制
        - 支持验证码防护机制
        
        ### 客户端凭证模式安全
        - SecretKey必须存储于安全介质
        - 仅在服务端可信环境中使用
        - 定期轮换SecretKey
        - 记录所有调用审计日志
        - 限制调用频率和IP白名单
        
        ## 使用场景
        
        ### Refresh Token刷新
        - access_token即将过期时自动刷新
        - 实现无感登录体验
        - 长期保持登录状态
        
        ### 密码模式
        - 用户首次登录
        - 可信的第一方应用
        - 内部管理系统
        
        ### 客户端凭证模式
        - 服务端API调用
        - 后台管理操作
        - 系统集成场景
        - 需要管理员权限的操作
        
        
        ### 错误响应示例
        ```json
        {
          "error": "invalid_grant",
          "error_code": 4001,
          "error_description": "refresh_token无效或已过期"
        }
        ```

  /auth/v1/token/introspect:
