    delete:
      summary: 删除当前用户信息
      deprecated: false
      description: |-
        ## 接口说明
        删除当前用户信息，需要先获取一个临时的管理权限的sudo_token才能执行。该操作会永久删除用户账号及相关数据，请谨慎使用。
        
        ### 功能特性
        - 永久删除当前用户账号
        - 需要sudo_token进行二次验证确保安全
        - 删除后无法恢复，需谨慎操作
        - 支持软删除和硬删除两种模式
        
        ## 入参要求
        
        ### 必需参数
        - `Authorization`: 当前登录用户的access_token（必填，Bearer格式）
        - `sudo_token`: 临时管理权限的token（必填，通过sudo接口获取）
        - `client_id`: 应用对应的客户端id（可选，默认为环境id）
        - `x-device-id`: 设备id（可选，当前登录设备的id）
        
        ### 请求体参数
        - 无请求体参数
        
        ## 前置条件
        - 用户必须已登录并持有有效的access_token
        - 必须通过sudo接口获取有效的sudo_token
        - sudo_token必须在有效期内（15分钟）
        - 用户确认要删除自己的账号
        
        ## 出参说明
        
        ### 成功响应
        - 返回空对象，表示删除成功
        
        ## 请求示例
        
        ### 删除用户请求示例
        ```
        DELETE /auth/v1/user/me?sudo_token=your_access_token
        Authorization: Bearer your_access_token
        Content-Type: application/json
        ```
        
        ## 响应示例
        
        ### 删除成功响应
        ```json
        {}
        ```
        
        ### sudo_token无效响应
        ```json
        {
          "error": "permission_denied",
          "error_code": 7,
          "error_description": "bad sudo token"
        }
        ```
        
        ### 用户不存在响应
        ```json
        {
          "error": "user_not_found",
          "error_code": 4004,
          "error_description": "用户不存在或已被删除"
        }
        ```
        
        ## 使用流程
        
        ### 1. 获取sudo_token
        - 调用[获取sudo_token接口](/http-api/auth/user-sudo)
        - 通过密码或验证码验证获取sudo_token
        
        ### 2. 确认删除
        - 前端应显示确认对话框
        - 用户确认删除操作
        
        ### 3. 执行删除
        - 调用此接口删除用户
        - 传入sudo_token进行二次验证
        
        ### 4. 清理客户端数据
        - 删除成功后清理本地存储
        - 跳转到登录页面
        
        ## 相关接口
        - [获取sudo_token](/http-api/auth/user-sudo) - 获取临时管理权限token
        - [修改密码](/http-api/auth/user-update-password) - 修改用户密码
        - [用户信息获取](/http-api/auth/user-me) - 获取当前用户信息
        - [退出登录](/http-api/auth/auth-sign-out) - 用户退出登录
        
        ## 错误处理
        
        ### 常见错误场景
        - sudo_token过期：提示用户重新验证
        - 权限不足：检查sudo_token是否正确
        - 网络异常：重试机制
        - 服务器错误：显示友好错误信息

