  /auth/v1/user/provider/{provider_id}:
    delete:
      summary: 解绑第三方账户
      deprecated: false
      description: |-
        ## 接口说明
        解绑第三方账户接口，用于解除当前登录用户与指定第三方身份源（如GitHub、微信、QQ等）的绑定关系。
        
        ## 入参要求
        
        ### 必填参数
        - `provider_id`: 身份源ID（必填，路径参数，如 wx_open、github、wechat 等）
        - `Authorization`: 当前登录用户的access_token（必填，在请求头中传递，格式为 Bearer xxx）
        
        ### 可选参数
        - `with_user_center`: 是否记录到用户中心化安全日志（可选，布尔值，默认false）
        - `client_id`: 客户端ID（可选，默认为环境ID）
        - `x-device-id`: 设备ID（可选，在请求头中传递）
        
        ## 前置条件
        - 用户必须已登录（需要有效的access_token）
        - 该身份源必须已经绑定到当前用户
        - 可以先调用 [获取账号绑定的三方身份源列表](/http-api/auth/user-providers) 接口查看已绑定的身份源
        
        ## 出参说明
        
        ### 成功响应
        - 返回空对象 `{}`，表示解绑成功
        
        ## 请求示例
        
        ### 解绑GitHub账号请求示例
        ```bash
        DELETE /auth/v1/user/provider/github?with_user_center=true
        Headers:
          Authorization: Bearer your_access_token
          x-device-id: device_abc123
        ```
        
        ### 解绑成功响应示例
        ```json
        {}
        ```
    
        ### 未登录响应示例
        ```json
        {
          "error": "unauthorized",
          "error_code": 4003,
          "error_description": "用户未登录或access_token无效"
        }
        ```
        
        ### 身份源不存在响应示例
        ```json
        {
          "error": "provider_not_found",
          "error_code": 4004,
          "error_description": "指定的身份源不存在"
        }
        ```
        
        ## 字段说明
        
        ### 请求参数
        | 字段名 | 类型 | 必填 | 位置 | 说明 |
        |--------|------|------|------|------|
        | provider_id | string | 是 | path | 身份源ID，如 wx_open、github、wechat、qq 等 |
        | Authorization | string | 是 | header | 当前登录用户的access_token，格式为 Bearer xxx |
        | with_user_center | boolean | 否 | query | 是否记录到用户中心化安全日志，默认false |
        | client_id | string | 否 | query | 客户端ID，默认为环境ID |
        | x-device-id | string | 否 | header | 设备ID |
        
        ### 响应参数
        | 字段名 | 类型 | 必填 | 说明 |
        |--------|------|------|------|
        | - | object | 是 | 成功时返回空对象 {} |
        
        ## 使用流程
        
        ### 完整解绑流程
        
        #### 1. 查看已绑定的身份源
        - 调用 [获取账号绑定的三方身份源列表](/http-api/auth/user-providers) 接口
        - 获取当前用户已绑定的身份源列表
        - 确认要解绑的身份源ID
        
        #### 2. 确认解绑操作
        - 提示用户确认解绑操作
        - 说明解绑后的影响
        - 确保至少保留一种登录方式
        
        #### 3. 执行解绑
        - 调用本接口
        - 传入要解绑的provider_id
        - 传入有效的access_token
        
        #### 4. 处理结果
        - 解绑成功：更新UI，移除该身份源
        - 解绑失败：显示错误信息，提示用户
                
        ## 注意事项
        
        ### AccessToken
        - 必须是有效的access_token
        - 必须在请求头中传递
        - 格式必须为 Bearer xxx
        - Token过期需要重新登录
        
        ### Provider ID
        - 必须是已绑定的身份源ID
        - 必须是有效的身份源
        - 可以通过列表接口查询
        
        ### 解绑后影响
        - 无法再使用该身份源登录
        - 需要使用其他已绑定的方式登录
        - 可以随时重新绑定
        - 不影响用户其他数据
        
        ## 错误处理
        
        ### 常见错误
        - `unauthorized`: 用户未登录或access_token无效
        - `provider_not_found`: 指定的身份源不存在
        - `internal_error`: 服务器内部错误
        
        ### 错误处理策略
        - 身份源未绑定：提示用户该身份源未绑定
        - 不能解绑最后一个：提示用户至少保留一种登录方式
        - 未登录：跳转到登录页面
        - 身份源不存在：提示用户选择有效的身份源
        - 服务器错误：稍后重试或联系客服
        
        ## 相关接口
        - [获取账号绑定的三方身份源列表](/http-api/auth/user-providers) - 查看已绑定的身份源
        - [绑定第三方账户](/http-api/auth/user-bind-with-provider) - 绑定新的第三方账号
        - [获取第三方登录回调地址](/http-api/auth/auth-gen-provider-redirect-uri) - 获取授权URL
        - [获取第三方授权信息](/http-api/auth/auth-grant-provider-token) - 获取provider_token

