<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Walk Product Promo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        margin: 0;
        overflow: hidden;
        background: #f5fff6;
        font-family: "PingFang SC", "Microsoft YaHei", "Inter", Arial, sans-serif;
      }

      #root {
        width: 1920px;
        height: 1080px;
        position: relative;
        overflow: hidden;
        background: #f5fff6;
      }

      .clip {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="20"
      data-width="1920"
      data-height="1080"
    >
      <div
        id="scene-hook"
        class="clip"
        data-composition-id="walk-hook"
        data-composition-src="compositions/scene1-logo-intro.html"
        data-start="0"
        data-duration="5"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <div
        id="scene-loop"
        class="clip"
        data-composition-id="walk-loop"
        data-composition-src="compositions/scene2-4-canvas.html"
        data-start="5"
        data-duration="8"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <div
        id="scene-reward"
        class="clip"
        data-composition-id="walk-reward"
        data-composition-src="compositions/scene5-logo-outro.html"
        data-start="13"
        data-duration="7"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const mainTl = gsap.timeline({ paused: true });
      mainTl.fromTo("#scene-loop", { opacity: 0 }, { opacity: 1, duration: 0.35 }, 5);
      mainTl.fromTo("#scene-reward", { opacity: 0 }, { opacity: 1, duration: 0.35 }, 13);
      window.__timelines["main"] = mainTl;
    </script>
  </body>
</html>
